<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <!-- Background Card -->
  <rect width="400" height="300" rx="16" fill="#F0FDF4" stroke="#DCFCE7" stroke-width="4"/>
  
  <!-- Outer Dotted Ring -->
  <circle cx="200" cy="130" r="80" fill="none" stroke="#16A34A" stroke-width="3" stroke-dasharray="8 6" opacity="0.8"/>
  
  <!-- Inner Ring -->
  <circle cx="200" cy="130" r="70" fill="none" stroke="#16A34A" stroke-width="2"/>
  
  <!-- Shield/Check icon -->
  <g transform="translate(175, 105)">
    <path d="M25 0 L45 8 V25 C45 37.5 37.5 47.5 25 52 C12.5 47.5 5 37.5 5 25 V8 Z" fill="#DCFCE7" stroke="#16A34A" stroke-width="3" stroke-linejoin="round"/>
    <path d="M15 25 L22 32 L35 18" fill="none" stroke="#16A34A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Stamp Text -->
  <text x="200" y="240" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" font-weight="bold" fill="#16A34A" text-anchor="middle" letter-spacing="1">
    VERIFIED BY CASHIER
  </text>
  <text x="200" y="262" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="600" fill="#15803D" text-anchor="middle" opacity="0.8">
    Pembayaran Diterima Manual
  </text>
  
  <!-- Subtle decorative stars -->
  <path d="M 100 130 L 104 134 L 100 138 L 96 134 Z" fill="#16A34A"/>
  <path d="M 300 130 L 304 134 L 300 138 L 296 134 Z" fill="#16A34A"/>
</svg>
